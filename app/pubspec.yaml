name: budgetflow
description: BudgetFlow – Application de gestion budgétaire Flutter (Android + Web).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (MVVM)
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Base de données SQLite
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^1.0.0

  # Utils fichiers
  path_provider: ^2.1.4
  path: ^1.9.0

  # Sécurité
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # Utilitaires
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.2

  # Graphiques
  fl_chart: ^0.69.0

  # Polices
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: ComicNeue
      fonts:
        - asset: lib/assets/fonts/ComicNeue-Regular.ttf
        - asset: lib/assets/fonts/ComicNeue-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: lib/assets/fonts/Nunito-Regular.ttf
        - asset: lib/assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: lib/assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: lib/assets/fonts/Nunito-Bold.ttf
          weight: 700